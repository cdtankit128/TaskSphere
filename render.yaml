services:
  # Backend: Docker Web Service
  - type: web
    name: backend
    runtime: docker
    rootDir: ./backend
    dockerContext: .
    plan: free
    healthCheckPath: /api/hello

  # Frontend: Docker Web Service
  - type: web
    name: frontend
    runtime: docker
    rootDir: ./frontend
    dockerContext: .
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://replace-this-after-backend-deploy.onrender.com
